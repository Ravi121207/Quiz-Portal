{% extends "base.html" %}
{% block start %}

<div class="container mt-5">
    <div class="row">
        <!-- Left margin using column -->
        <div class="col-md-8 offset-md-2">
            
            <div class="card shadow-lg p-4">
                <h2 class="mb-4 text-center">Quiz</h2>

                <form method="post">
                    {% csrf_token %}

                    {% for q in questions %}
                    <div class="mb-4">
                        <h5 class="fw-semibold">{{ forloop.counter }}. {{ q.question }}</h5>

                        <div class="form-check mt-2">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="{{ q.option1 }}" required>
                            <label class="form-check-label">
                                {{ q.option1 }}
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="{{ q.option2 }}">
                            <label class="form-check-label">
                                {{ q.option2 }}
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="{{ q.option3 }}">
                            <label class="form-check-label">
                                {{ q.option3 }}
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="{{ q.id }}" value="{{ q.option4 }}">
                            <label class="form-check-label">
                                {{ q.option4 }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        Submit Quiz
                    </button>
                </form>

            </div>

        </div>
    </div>
</div>

{% endblock %}
